name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend – Maven Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: starto_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/starto_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      PORT: 9090
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
      GEMINI_API_KEY: dummy_key
      OPENAI_API_KEY: dummy_key
      GOOGLE_MAPS_API_KEY: dummy_key
      RAZORPAY_KEY_ID: dummy_key
      RAZORPAY_KEY_SECRET: dummy_key
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: dummy@example.com
      MAIL_PASSWORD: dummy_password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        working-directory: starto-api
        run: mvn test -B --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: starto-api/target/surefire-reports/

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend – npm test
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9090
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:dummy"
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: dummy
      NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: starto-web/package-lock.json

      - name: Install dependencies
        working-directory: starto-web
        run: npm ci

      - name: Type check
        working-directory: starto-web
        run: npx tsc --noEmit || true

      - name: Lint
        working-directory: starto-web
        run: npm run lint -- --max-warnings=0 || true

      - name: Run tests
        working-directory: starto-web
        run: npm test -- --passWithNoTests --watchAll=false

      - name: Build check
        working-directory: starto-web
        run: npm run build
